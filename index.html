<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>Rizz Live – Policy Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800;900&family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    @keyframes twinkle { 0%,100%{opacity:0.1;transform:scale(0.7)} 50%{opacity:1;transform:scale(1.2)} }

    /* ── TWINKLING STARS CANVAS ── */
    #stars-canvas {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none; z-index: 0;
    }

    @keyframes logoGlow {
      0%,100%{box-shadow:0 4px 20px rgba(160,80,255,0.25),0 1px 4px rgba(0,0,0,0.08)}
      50%{box-shadow:0 8px 36px rgba(160,80,255,0.45),0 1px 4px rgba(0,0,0,0.08)}
    }
    @keyframes badgePulse {
      0%,100%{box-shadow:0 0 0 0 rgba(160,80,255,0.4)}
      60%{box-shadow:0 0 0 8px rgba(160,80,255,0)}
    }
    @keyframes accOpen { from{opacity:0;transform:translateY(-6px)} to{opacity:1;transform:translateY(0)} }

    body {
      background: #f5f3ff;
      font-family: 'Nunito', sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
      min-height: 100vh;
    }

    .blob { position: fixed; border-radius: 50%; pointer-events: none; z-index: 0; filter: blur(80px); opacity: 0.28; }
    .blob-1 { width: 280px; height: 280px; background: #c084fc; top: -60px; right: -60px; }
    .blob-2 { width: 240px; height: 240px; background: #818cf8; bottom: -50px; left: -50px; }
    .blob-3 { width: 160px; height: 160px; background: #f9a8d4; top: 40%; left: 60%; }

    .page { display: none; position: relative; z-index: 1; padding: 24px 16px 56px; max-width: 480px; margin: 0 auto; min-height: 100vh; }
    .page.active { display: block; animation: fadeUp 0.4s ease both; }

    /* ── HEADER CARD ── */
    .header-card {
      background: #fff; border-radius: 20px; border: 1px solid rgba(160,80,255,0.15);
      padding: 14px 18px; display: flex; align-items: center; gap: 14px; margin-bottom: 18px;
      box-shadow: 0 2px 16px rgba(120,60,220,0.08), 0 1px 3px rgba(0,0,0,0.04);
    }
    .header-logo {
      width: 52px; height: 52px; border-radius: 14px; overflow: hidden; flex-shrink: 0;
      animation: logoGlow 3.5s ease-in-out infinite;
      background: linear-gradient(135deg, #f3e8ff, #ede9fe);
      display: flex; align-items: center; justify-content: center;
    }
    .header-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 14px; }
    .logo-fallback { font-family: 'Outfit', sans-serif; font-size: 22px; font-weight: 800; background: linear-gradient(135deg, #a855f7, #6366f1); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .brand { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; color: #1e1b4b; letter-spacing: 0.02em; }
    .tagline { font-size: 12px; color: #7c6fa0; margin-top: 1px; }

    .back-btn {
      display: inline-flex; align-items: center; gap: 7px;
      background: #fff; border: 1px solid rgba(168,85,247,0.2);
      border-radius: 100px; padding: 9px 18px;
      font-size: 13px; font-weight: 600; color: #7c3aed;
      cursor: pointer; text-decoration: none;
      box-shadow: 0 2px 10px rgba(120,60,220,0.08);
      transition: all 0.2s; margin-bottom: 20px; touch-action: manipulation;
    }
    .back-btn:active { transform: scale(0.96); }

    .section-head { text-align: center; margin-bottom: 22px; }
    .badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: linear-gradient(90deg, #a855f7, #6366f1);
      color: #fff; font-size: 11px; font-weight: 700; letter-spacing: 0.1em;
      padding: 5px 16px; border-radius: 100px; margin-bottom: 12px;
      text-transform: uppercase; animation: badgePulse 2.5s ease-in-out infinite;
    }
    .page-title { font-family: 'Outfit', sans-serif; font-size: 28px; font-weight: 800; color: #1e1b4b; letter-spacing: -0.02em; }
    .page-title .accent { background: linear-gradient(90deg, #a855f7, #6366f1, #a855f7); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
    .title-line { width: 40px; height: 3px; background: linear-gradient(90deg, #a855f7, #6366f1); border-radius: 100px; margin: 10px auto 0; }

    .section-label { font-size: 10px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #9882c0; margin-bottom: 10px; padding-left: 2px; }
    .group { margin-bottom: 22px; }
    .group:nth-child(1){animation:fadeUp 0.4s 0.12s ease both}
    .group:nth-child(2){animation:fadeUp 0.4s 0.2s ease both}
    .group:nth-child(3){animation:fadeUp 0.4s 0.28s ease both}

    .nav-btn {
      display: flex; align-items: center; gap: 14px; width: 100%; background: #fff;
      border: 1px solid rgba(160,80,255,0.12); border-radius: 18px; padding: 15px 16px; margin-bottom: 10px;
      text-decoration: none; color: inherit; cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
      box-shadow: 0 1px 6px rgba(120,60,220,0.05); touch-action: manipulation; -webkit-appearance: none; background-clip: padding-box;
    }
    .nav-btn:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(120,60,220,0.14); }

    .icon-wrap { width: 46px; height: 46px; border-radius: 13px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
    .ic-purple  { background: linear-gradient(135deg, #f3e8ff, #ede9fe); }
    .ic-indigo  { background: linear-gradient(135deg, #eef2ff, #e0e7ff); }
    .ic-pink    { background: linear-gradient(135deg, #fdf2f8, #fce7f3); }
    .ic-emerald { background: linear-gradient(135deg, #d1fae5, #a7f3d0); }
    .ic-amber   { background: linear-gradient(135deg, #fef3c7, #fde68a); }

    .btn-content { flex: 1; }
    .btn-title { font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 700; color: #1e1b4b; letter-spacing: 0.01em; }
    .btn-sub { font-size: 12px; color: #7c6fa0; margin-top: 3px; }
    .btn-arrow { width: 30px; height: 30px; border-radius: 9px; background: linear-gradient(135deg, #f3e8ff, #ede9fe); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 16px; color: #a855f7; font-weight: 700; }

    .nav-btn.btn-host { border-color: rgba(168,85,247,0.18); }
    .nav-btn.btn-host:hover, .nav-btn.btn-host:active {
      background: linear-gradient(135deg, #faf5ff, #f3e8ff);
      border-color: rgba(168,85,247,0.5);
      box-shadow: 0 6px 24px rgba(168,85,247,0.18);
    }
    .nav-btn.btn-host:hover .btn-arrow { background: linear-gradient(135deg, #a855f7, #7c3aed); color: #fff; }
    .nav-btn.btn-host:hover .btn-title { color: #7c3aed; }

    .nav-btn.btn-agency { border-color: rgba(99,102,241,0.18); }
    .nav-btn.btn-agency:hover, .nav-btn.btn-agency:active {
      background: linear-gradient(135deg, #eef2ff, #e0e7ff);
      border-color: rgba(99,102,241,0.5);
      box-shadow: 0 6px 24px rgba(99,102,241,0.18);
    }
    .nav-btn.btn-agency:hover .btn-arrow { background: linear-gradient(135deg, #6366f1, #4f46e5); color: #fff; }
    .nav-btn.btn-agency:hover .btn-title { color: #4f46e5; }

    .nav-btn.btn-admin { border-color: rgba(245,158,11,0.18); }
    .nav-btn.btn-admin:hover, .nav-btn.btn-admin:active {
      background: linear-gradient(135deg, #fffbeb, #fef3c7);
      border-color: rgba(245,158,11,0.5);
      box-shadow: 0 6px 24px rgba(245,158,11,0.18);
    }
    .nav-btn.btn-admin:hover .btn-arrow { background: linear-gradient(135deg, #f59e0b, #d97706); color: #fff; }
    .nav-btn.btn-admin:hover .btn-title { color: #d97706; }

    .nav-btn.btn-channel { border-color: rgba(5,150,105,0.18); }
    .nav-btn.btn-channel:hover, .nav-btn.btn-channel:active {
      background: linear-gradient(135deg, #ecfdf5, #d1fae5);
      border-color: rgba(5,150,105,0.45);
      box-shadow: 0 6px 24px rgba(5,150,105,0.15);
    }
    .nav-btn.btn-channel:hover .icon-wrap { background: linear-gradient(135deg, #a7f3d0, #6ee7b7); }
    .nav-btn.btn-channel:hover .btn-arrow { background: linear-gradient(135deg, #059669, #047857); color: #fff; }
    .nav-btn.btn-channel:hover .btn-title { color: #047857; }
    .nav-btn.btn-channel:hover .btn-sub { color: #34d399; }

    .divider { height: 1px; background: linear-gradient(90deg, transparent, rgba(168,85,247,0.2), transparent); margin: 14px 0 18px; }

    .footer { text-align: center; font-size: 12px; color: #9882c0; margin-top: 14px; letter-spacing: 0.04em; }
    .footer .rl { background: linear-gradient(90deg, #a855f7, #6366f1); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; font-weight: 700; }

    .acc { background: #fff; border: 1px solid rgba(160,80,255,0.13); border-radius: 18px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(120,60,220,0.06); }
    .acc:nth-child(1){animation:fadeUp 0.4s 0.14s ease both}
    .acc:nth-child(2){animation:fadeUp 0.4s 0.21s ease both}
    .acc:nth-child(3){animation:fadeUp 0.4s 0.28s ease both}
    .acc:nth-child(4){animation:fadeUp 0.4s 0.35s ease both}
    .acc:nth-child(5){animation:fadeUp 0.4s 0.42s ease both}
    .acc:nth-child(6){animation:fadeUp 0.4s 0.49s ease both}

    .acc-header { display: flex; align-items: center; gap: 12px; padding: 16px 18px; cursor: pointer; transition: background 0.2s; user-select: none; touch-action: manipulation; }
    .acc-header:active { background: rgba(168,85,247,0.04); }
    .acc-num { width: 34px; height: 34px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-family: 'Outfit', sans-serif; font-size: 14px; font-weight: 800; color: #fff; flex-shrink: 0; }
    .n-purple  { background: linear-gradient(135deg, #a855f7, #6366f1); }
    .n-indigo  { background: linear-gradient(135deg, #6366f1, #4f46e5); }
    .n-emerald { background: linear-gradient(135deg, #10b981, #059669); }
    .n-amber   { background: linear-gradient(135deg, #f59e0b, #d97706); }
    .n-pink    { background: linear-gradient(135deg, #ec4899, #be185d); }
    .n-red     { background: linear-gradient(135deg, #ef4444, #dc2626); }

    .acc-title { font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700; color: #1e1b4b; flex: 1; line-height: 1.3; letter-spacing: -0.01em; }
    .acc-chevron { font-size: 20px; color: #a855f7; transition: transform 0.3s; flex-shrink: 0; }
    .acc.open .acc-chevron { transform: rotate(180deg); }
    .acc-body { display: none; padding: 0 16px 16px; animation: accOpen 0.3s ease; }
    .acc.open .acc-body { display: block; }

    .sub-head { display: flex; align-items: center; gap: 8px; font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 800; color: #7c3aed; margin: 14px 0 10px; border-left: 3px solid #a855f7; padding-left: 10px; }

    .tbl-wrap { overflow-x: visible; margin-bottom: 10px; border-radius: 12px; }
    .tbl { width: 100%; border-collapse: collapse; border-radius: 12px; overflow: hidden; }
    .tbl thead tr { background: linear-gradient(90deg, rgba(168,85,247,0.15), rgba(99,102,241,0.12)); }
    .tbl th { padding: 8px 6px; font-size: 9px; font-weight: 700; color: #5b21b6; letter-spacing: 0.04em; text-transform: uppercase; text-align: left; white-space: nowrap; }
    .tbl td { padding: 8px 6px; font-size: 12px; color: #374151; border-bottom: 1px solid rgba(168,85,247,0.08); word-break: break-word; }
    .tbl tr:last-child td { border-bottom: none; }
    .tbl tr:nth-child(even) td { background: rgba(168,85,247,0.03); }

    .val-gold { color: #d97706; font-weight: 700; }
    .val-green { color: #059669; font-weight: 700; }
    .val-pink { color: #db2777; font-weight: 700; }
    .val-purple { color: #7c3aed; font-weight: 700; }
    .val-red { color: #dc2626; font-weight: 700; }
    .hl-gold { color: #d97706; font-weight: 700; }
    .hl-green { color: #059669; font-weight: 700; }
    .hl-purple { color: #7c3aed; font-weight: 700; }
    .hl-pink { color: #db2777; font-weight: 700; }
    .hl-red { color: #dc2626; font-weight: 700; }

    .example-box, .info-box { background: linear-gradient(135deg, rgba(168,85,247,0.07), rgba(99,102,241,0.05)); border: 1px solid rgba(168,85,247,0.18); border-radius: 12px; padding: 12px 14px; margin: 10px 0; }
    .example-label, .info-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #a855f7; text-transform: uppercase; margin-bottom: 6px; }
    .example-box p, .info-box p { font-size: 13px; color: #374151; line-height: 1.65; }

    .strict-box { background: linear-gradient(135deg, rgba(239,68,68,0.07), rgba(220,38,38,0.04)); border: 1px solid rgba(239,68,68,0.22); border-radius: 12px; padding: 12px 14px; margin: 10px 0; }
    .strict-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #dc2626; text-transform: uppercase; margin-bottom: 6px; }
    .strict-box p { font-size: 13px; color: #374151; line-height: 1.65; }

    .amber-box { background: linear-gradient(135deg, rgba(245,158,11,0.07), rgba(217,119,6,0.04)); border: 1px solid rgba(245,158,11,0.22); border-radius: 12px; padding: 12px 14px; margin: 10px 0; }
    .amber-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #d97706; text-transform: uppercase; margin-bottom: 6px; }
    .amber-box p { font-size: 13px; color: #374151; line-height: 1.65; }

    .green-box { background: linear-gradient(135deg, rgba(16,185,129,0.07), rgba(5,150,105,0.04)); border: 1px solid rgba(16,185,129,0.22); border-radius: 12px; padding: 12px 14px; margin: 10px 0; }
    .green-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; color: #059669; text-transform: uppercase; margin-bottom: 6px; }
    .green-box p { font-size: 13px; color: #374151; line-height: 1.65; }

    .blist { list-style: none; margin: 8px 0; }
    .blist li { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: #374151; line-height: 1.6; padding: 4px 0; }
    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }
    .dot-green  { background: #10b981; }
    .dot-gold   { background: #d97706; }
    .dot-purple { background: #a855f7; }
    .dot-pink   { background: #ec4899; }
    .dot-red    { background: #ef4444; }
    .dot-blue   { background: #3b82f6; }
    .dot-amber  { background: #f59e0b; }

    .stat-row { display: flex; gap: 10px; margin: 10px 0; }
    .stat-chip { flex: 1; background: linear-gradient(135deg, rgba(168,85,247,0.08), rgba(99,102,241,0.06)); border: 1px solid rgba(168,85,247,0.14); border-radius: 10px; padding: 10px 12px; text-align: center; }
    .stat-chip .sv { font-family: 'Outfit', sans-serif; font-size: 18px; font-weight: 800; color: #7c3aed; }
    .stat-chip .sl { font-size: 11px; color: #9882c0; margin-top: 2px; }

    .time-row { display: flex; align-items: center; gap: 8px; margin: 10px 0; }
    .time-chip { flex: 1; background: linear-gradient(135deg, rgba(168,85,247,0.1), rgba(99,102,241,0.07)); border: 1px solid rgba(168,85,247,0.2); border-radius: 12px; padding: 10px 8px; text-align: center; }
    .time-chip .tc-label { font-size: 10px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #9882c0; margin-bottom: 4px; }
    .time-chip .tc-val { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 800; color: #7c3aed; }
    .time-chip .tc-tz { font-size: 11px; color: #a855f7; margin-top: 2px; font-weight: 600; }
    .time-arrow { font-size: 18px; color: #a855f7; flex-shrink: 0; }

    /* Numbered list for admin policy */
    .nlist { list-style: none; margin: 8px 0; counter-reset: nlist; }
    .nlist li { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: #374151; line-height: 1.6; padding: 5px 0; counter-increment: nlist; }
    .nlist li::before { content: counter(nlist); min-width: 22px; height: 22px; border-radius: 6px; background: linear-gradient(135deg, #a855f7, #6366f1); color: #fff; font-size: 11px; font-weight: 800; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 1px; }
  </style>
</head>
<body>

<canvas id="stars-canvas"></canvas>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<!-- ═══════════════ PAGE 1: HOME ═══════════════ -->
<div class="page active" id="page-home">

  <div class="header-card">
    <div class="header-logo">
      <img src="RizzLive.png" alt="Rizz Live" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
      <span class="logo-fallback" style="display:none">R</span>
    </div>
    <div>
      <div class="brand">RIZZ LIVE</div>
      <div class="tagline" data-i18n="tagline">Live Streaming Platform</div>
    </div>
  </div>

  <div class="section-head" style="animation:fadeUp 0.4s 0.06s ease both;">
    <div class="badge" data-i18n="badge_home">📋 Official Documents</div>
    <div class="page-title">Rizz Live <span class="accent" data-i18n="policy_word">Policy</span></div>
    <div class="title-line"></div>
  </div>


  <div class="group">
    <div class="section-label" data-i18n="label_policies">Policies</div>
    <button class="nav-btn btn-host" onclick="showPage('page-host')">
      <div class="icon-wrap ic-purple">🎙️</div>
      <div class="btn-content">
        <div class="btn-title" data-i18n="host_policy_title">HOST POLICY</div>
        <div class="btn-sub" data-i18n="host_policy_sub">Rules &amp; guidelines for hosts</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>
    <button class="nav-btn btn-agency" onclick="showPage('page-agency')">
      <div class="icon-wrap ic-indigo">🏢</div>
      <div class="btn-content">
        <div class="btn-title" data-i18n="agency_policy_title">AGENCY POLICY</div>
        <div class="btn-sub" data-i18n="agency_policy_sub">Agency terms &amp; conditions</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>
  </div>

  <div class="divider"></div>

  <div class="group">
    <div class="section-label" data-i18n="label_hiring">Hiring Open Roles</div>
    <button class="nav-btn btn-admin" onclick="showPage('page-admin')">
      <div class="icon-wrap ic-amber">👑</div>
      <div class="btn-content">
        <div class="btn-title" data-i18n="admin_policy_title">COUNTRY ADMIN, SUPER ADMIN &amp; ADMIN</div>
        <div class="btn-sub" data-i18n="admin_policy_sub">Admin roles &amp; commission structure</div>
      </div>
      <div class="btn-arrow">›</div>
    </button>
  </div>

  <div class="divider"></div>

  <div class="group">
    <div class="section-label" data-i18n="label_contact">Contact</div>
    <div class="nav-btn btn-channel" onclick="openLink('https://chat.whatsapp.com/Lf1CgwSUZSRKamClwBOBWQ')" role="link" style="cursor:pointer;">
      <div class="icon-wrap ic-emerald">📢</div>
      <div class="btn-content">
        <div class="btn-title" data-i18n="channel_title">JOIN OFFICIAL CHANNEL</div>
        <div class="btn-sub" data-i18n="channel_sub">Daily updates on WhatsApp</div>
      </div>
      <div class="btn-arrow">›</div>
    </div>
  </div>

  <div class="footer"><span class="rl">Rizz Live</span> &nbsp;·&nbsp; <span data-i18n="all_rights"
